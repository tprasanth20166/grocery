<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Grocery">
<title>Grocery Manager</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap');

  :root {
    --bg: #f5f5f0;
    --card: #ffffff;
    --primary: #2d6a4f;
    --primary-light: #e8f5e9;
    --accent: #f4a261;
    --text: #1a1a1a;
    --text-muted: #888;
    --border: #e8e8e0;
    --red: #e63946;
    --red-light: #ffeaea;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
  }

  header {
    background: var(--primary);
    padding: 50px 20px 20px;
    color: white;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 { font-size: 24px; font-weight: 600; }
  header p { font-size: 13px; opacity: 0.7; margin-top: 2px; }

  .tabs {
    display: flex;
    background: rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 4px;
    margin-top: 14px;
    gap: 4px;
  }

  .tab {
    flex: 1;
    padding: 8px;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.7);
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 500;
    border-radius: 9px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab.active {
    background: white;
    color: var(--primary);
  }

  .badge {
    display: inline-block;
    background: var(--accent);
    color: white;
    border-radius: 20px;
    font-size: 11px;
    padding: 1px 7px;
    margin-left: 4px;
    font-weight: 600;
  }

  .section { display: none; padding: 16px; }
  .section.active { display: block; }

  .add-box {
    background: var(--card);
    border-radius: 16px;
    padding: 16px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
    display: flex;
    gap: 10px;
  }

  .add-box input {
    flex: 1;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    outline: none;
    background: var(--bg);
    color: var(--text);
    transition: border 0.2s;
  }
  .add-box input:focus { border-color: var(--primary); }

  .btn-add {
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-add:active { opacity: 0.8; }

  .category-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin: 16px 0 8px;
  }

  .item-card {
    background: var(--card);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: var(--shadow);
    transition: transform 0.15s;
  }
  .item-card:active { transform: scale(0.98); }

  .item-card.selected {
    background: var(--primary-light);
    border: 1.5px solid var(--primary);
  }

  .checkbox {
    width: 24px; height: 24px;
    border-radius: 8px;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
    font-size: 14px;
  }
  .item-card.selected .checkbox {
    background: var(--primary);
    border-color: var(--primary);
    color: white;
  }

  .item-name {
    flex: 1;
    font-size: 16px;
    font-weight: 400;
  }
  .item-card.selected .item-name { font-weight: 500; color: var(--primary); }

  .item-qty {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .qty-btn {
    width: 28px; height: 28px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--bg);
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--text);
    transition: all 0.15s;
    line-height: 1;
  }
  .qty-btn:active { background: var(--border); }

  .qty-num {
    font-size: 15px;
    font-weight: 500;
    min-width: 20px;
    text-align: center;
  }

  .delete-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 18px;
    cursor: pointer;
    padding: 4px;
    border-radius: 8px;
    transition: all 0.2s;
    line-height: 1;
  }
  .delete-btn:active { background: var(--red-light); color: var(--red); }

  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
  }
  .empty .icon { font-size: 48px; margin-bottom: 12px; }
  .empty p { font-size: 15px; }

  /* Order list */
  .order-header {
    background: var(--card);
    border-radius: 16px;
    padding: 16px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .order-header h2 { font-size: 18px; font-weight: 600; }
  .order-header span { font-size: 13px; color: var(--text-muted); }

  .order-item {
    background: var(--card);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: var(--shadow);
  }

  .order-item-left { display: flex; align-items: center; gap: 10px; }
  .order-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); }
  .order-name { font-size: 16px; }
  .order-qty {
    background: var(--primary-light);
    color: var(--primary);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 14px;
    font-weight: 600;
  }

  .clear-btn {
    width: 100%;
    padding: 14px;
    background: var(--red-light);
    color: var(--red);
    border: none;
    border-radius: 14px;
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 16px;
    transition: opacity 0.2s;
  }
  .clear-btn:active { opacity: 0.8; }

  .share-btn {
    width: 100%;
    padding: 14px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 14px;
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s;
  }
  .share-btn:active { opacity: 0.8; }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1a1a1a;
    color: white;
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 14px;
    transition: transform 0.3s;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <h1>🛒 Grocery Manager</h1>
  <p>உங்கள் வாரம் order plan</p>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('all')">எல்லாமே <span class="badge" id="all-count">0</span></button>
    <button class="tab" onclick="switchTab('order')">இந்த வாரம் <span class="badge" id="order-count">0</span></button>
  </div>
</header>

<div class="section active" id="tab-all">
  <div class="add-box">
    <input type="text" id="new-item" placeholder="Item சேர்க்க type செய்யுங்க..." onkeydown="if(event.key==='Enter')addItem()">
    <button class="btn-add" onclick="addItem()">+ சேர்</button>
  </div>
  <div id="items-list"></div>
</div>

<div class="section" id="tab-order">
  <div id="order-list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  let items = JSON.parse(localStorage.getItem('grocery_items') || '[]');

  function save() {
    localStorage.setItem('grocery_items', JSON.stringify(items));
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  function addItem() {
    const input = document.getElementById('new-item');
    const name = input.value.trim();
    if (!name) return;
    if (items.find(i => i.name.toLowerCase() === name.toLowerCase())) {
      showToast('⚠️ இந்த item ஏற்கனவே இருக்கு!');
      return;
    }
    items.push({ id: Date.now(), name, selected: false, qty: 1 });
    save();
    input.value = '';
    render();
    showToast('✅ ' + name + ' சேர்க்கப்பட்டது!');
  }

  function toggleItem(id) {
    const item = items.find(i => i.id === id);
    if (item) { item.selected = !item.selected; save(); render(); }
  }

  function deleteItem(id) {
    items = items.filter(i => i.id !== id);
    save(); render();
    showToast('🗑️ Item நீக்கப்பட்டது');
  }

  function changeQty(id, delta) {
    const item = items.find(i => i.id === id);
    if (item) {
      item.qty = Math.max(1, (item.qty || 1) + delta);
      save(); render();
    }
  }

  function clearSelections() {
    if (!confirm('இந்த வாரம் selections clear ஆகும். சரியா?')) return;
    items.forEach(i => { i.selected = false; i.qty = 1; });
    save(); render();
    showToast('✅ வார list clear ஆச்சு!');
  }

  function shareList() {
    const selected = items.filter(i => i.selected);
    if (!selected.length) { showToast('⚠️ எந்த item-உம் select ஆகல!'); return; }
    const text = '🛒 இந்த வாரம் Grocery List:\n\n' + selected.map(i => `${i.name}-${i.qty}`).join('\n');
    if (navigator.share) {
      navigator.share({ title: 'Grocery List', text });
    } else {
      navigator.clipboard.writeText(text).then(() => showToast('📋 List copy ஆச்சு!'));
    }
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='all')||(i===1&&tab==='order')));
    document.getElementById('tab-all').classList.toggle('active', tab === 'all');
    document.getElementById('tab-order').classList.toggle('active', tab === 'order');
  }

  function render() {
    const selected = items.filter(i => i.selected);
    const unselected = items.filter(i => !i.selected);

    document.getElementById('all-count').textContent = items.length;
    document.getElementById('order-count').textContent = selected.length;

    // All items list
    const list = document.getElementById('items-list');
    if (!items.length) {
      list.innerHTML = `<div class="empty"><div class="icon">🛍️</div><p>Items இல்ல!<br>மேலே type செய்து சேர்க்கவும்</p></div>`;
    } else {
      let html = '';
      if (selected.length) {
        html += `<div class="category-label">✅ இந்த வாரம் order (${selected.length})</div>`;
        html += selected.map(item => itemHTML(item)).join('');
      }
      if (unselected.length) {
        html += `<div class="category-label">📦 எல்லா items (${unselected.length})</div>`;
        html += unselected.map(item => itemHTML(item)).join('');
      }
      list.innerHTML = html;
    }

    // Order list
    const orderList = document.getElementById('order-list');
    if (!selected.length) {
      orderList.innerHTML = `<div class="empty"><div class="icon">🗂️</div><p>எந்த item-உம் select ஆகல!<br>"எல்லாமே" tab-ல் போய் tick செய்யுங்க</p></div>`;
    } else {
      let html = `<div class="order-header"><h2>இந்த வாரம் order</h2><span>${selected.length} items</span></div>`;
      html += selected.map(item => `
        <div class="order-item">
          <div class="order-item-left">
            <div class="order-dot"></div>
            <span class="order-name">${item.name}</span>
          </div>
          <span class="order-qty">- ${item.qty}</span>
        </div>
      `).join('');
      html += `<button class="share-btn" onclick="shareList()">📤 List Share / Copy செய்</button>`;
      html += `<button class="clear-btn" onclick="clearSelections()">🔄 வாரம் முடிஞ்சது — Clear செய்</button>`;
      orderList.innerHTML = html;
    }
  }

  function itemHTML(item) {
    return `
      <div class="item-card ${item.selected ? 'selected' : ''}" onclick="toggleItem(${item.id})">
        <div class="checkbox">${item.selected ? '✓' : ''}</div>
        <span class="item-name">${item.name}</span>
        ${item.selected ? `
        <div class="item-qty" onclick="event.stopPropagation()">
          <div class="qty-btn" onclick="changeQty(${item.id},-1)">−</div>
          <span class="qty-num">${item.qty}</span>
          <div class="qty-btn" onclick="changeQty(${item.id},1)">+</div>
        </div>` : ''}
        <button class="delete-btn" onclick="event.stopPropagation();deleteItem(${item.id})">✕</button>
      </div>
    `;
  }

  render();
</script>
</body>
</html>
