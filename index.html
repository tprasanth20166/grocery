<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Grocery">
<title>Grocery Manager</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Outfit:wght@300;400;500;600&display=swap');

  :root {
    --bg: #f7f6f2;
    --card: #ffffff;
    --primary: #1b4332;
    --primary-mid: #2d6a4f;
    --primary-light: #d8f3dc;
    --accent: #f4a261;
    --accent2: #e76f51;
    --text: #1a1a1a;
    --text-muted: #999;
    --border: #e8e6df;
    --red: #e63946;
    --red-light: #fff0f0;
    --shadow: 0 2px 16px rgba(0,0,0,0.07);
    --shadow-sm: 0 1px 6px rgba(0,0,0,0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
  }

  /* HEADER */
  header {
    background: var(--primary);
    padding: 52px 24px 22px;
    color: white;
    position: sticky;
    top: 0;
    z-index: 100;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -20px; left: 30px;
    width: 80px; height: 80px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }

  .header-top { display: flex; align-items: flex-start; justify-content: space-between; position: relative; z-index: 1; }
  .header-title { }
  .header-icon { font-size: 28px; margin-bottom: 4px; }
  .header-title h1 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }
  .header-title p { font-size: 12px; opacity: 0.6; margin-top: 3px; letter-spacing: 0.5px; text-transform: uppercase; }
  .header-badge {
    background: var(--accent);
    color: white;
    border-radius: 20px;
    font-size: 12px;
    padding: 4px 12px;
    font-weight: 600;
    margin-top: 4px;
  }

  .tabs {
    display: flex;
    background: rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 4px;
    margin-top: 16px;
    gap: 4px;
    position: relative;
    z-index: 1;
  }
  .tab {
    flex: 1; padding: 9px; border: none;
    background: transparent; color: rgba(255,255,255,0.65);
    font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 500;
    border-radius: 9px; cursor: pointer; transition: all 0.2s;
  }
  .tab.active { background: white; color: var(--primary); font-weight: 600; }
  .tab-count {
    display: inline-block; background: var(--accent);
    color: white; border-radius: 20px; font-size: 11px;
    padding: 1px 7px; margin-left: 4px; font-weight: 600;
  }

  .section { display: none; padding: 16px; }
  .section.active { display: block; }

  /* ADD BOX */
  .add-box {
    background: var(--card);
    border-radius: 18px;
    padding: 16px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    border: 1px solid var(--border);
  }
  .add-box-label {
    font-size: 11px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;
  }
  .add-row { display: flex; gap: 10px; }
  .add-box input {
    flex: 1; border: 1.5px solid var(--border); border-radius: 12px;
    padding: 11px 14px; font-family: 'Outfit', sans-serif; font-size: 15px;
    outline: none; background: var(--bg); color: var(--text); transition: border 0.2s;
  }
  .add-box input:focus { border-color: var(--primary-mid); }
  .btn-add {
    background: var(--primary); color: white; border: none;
    border-radius: 12px; padding: 11px 20px;
    font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .btn-add:active { opacity: 0.85; transform: scale(0.97); }

  /* SECTION LABELS */
  .list-label {
    font-size: 11px; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 1.5px;
    margin: 20px 0 10px 2px;
    display: flex; align-items: center; gap: 8px;
  }
  .list-label::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* ITEM CARD */
  .item-card {
    background: var(--card);
    border-radius: 14px;
    padding: 13px 14px;
    margin-bottom: 2px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border);
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
  }
  .item-card:active { transform: scale(0.985); }
  .item-card.selected {
    background: var(--primary-light);
    border-color: var(--primary-mid);
    box-shadow: 0 2px 12px rgba(45,106,79,0.15);
  }

  .checkbox {
    width: 22px; height: 22px; border-radius: 7px;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s; flex-shrink: 0; font-size: 13px;
  }
  .item-card.selected .checkbox { background: var(--primary); border-color: var(--primary); color: white; }

  .item-name { flex: 1; font-size: 15px; font-weight: 400; }
  .item-card.selected .item-name { font-weight: 500; color: var(--primary); }

  .item-qty { display: flex; align-items: center; gap: 6px; }
  .qty-btn {
    width: 26px; height: 26px; border-radius: 8px;
    border: 1.5px solid var(--border); background: var(--bg);
    font-size: 16px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text); transition: all 0.15s; line-height: 1;
  }
  .qty-btn:active { background: var(--border); }
  .qty-num { font-size: 14px; font-weight: 600; min-width: 18px; text-align: center; color: var(--primary); }

  .item-actions { display: flex; align-items: center; gap: 4px; }
  .delete-btn {
    background: none; border: none; color: var(--text-muted);
    font-size: 16px; cursor: pointer; padding: 4px; border-radius: 8px;
    transition: all 0.2s; line-height: 1;
  }
  .delete-btn:active { background: var(--red-light); color: var(--red); }

  /* INSERT BETWEEN BUTTON */
  .insert-zone {
    display: flex; align-items: center; gap: 8px;
    margin: 2px 0; opacity: 0; transition: opacity 0.2s;
    height: 28px;
  }
  .insert-zone:hover { opacity: 1; }
  .insert-line { flex: 1; height: 1px; background: var(--border); }
  .insert-btn {
    background: white; border: 1.5px dashed var(--primary-mid);
    color: var(--primary-mid); border-radius: 20px;
    font-size: 11px; font-weight: 600; padding: 3px 10px;
    cursor: pointer; white-space: nowrap; font-family: 'Outfit', sans-serif;
    transition: all 0.2s;
  }
  .insert-btn:hover { background: var(--primary-light); }
  .insert-btn:active { transform: scale(0.95); }

  /* INLINE INSERT INPUT */
  .inline-insert {
    background: var(--primary-light);
    border-radius: 12px; padding: 10px 12px;
    margin: 4px 0; display: none; gap: 8px; align-items: center;
    border: 1.5px solid var(--primary-mid);
  }
  .inline-insert.show { display: flex; }
  .inline-insert input {
    flex: 1; border: none; background: transparent;
    font-family: 'Outfit', sans-serif; font-size: 14px;
    outline: none; color: var(--text);
  }
  .inline-insert input::placeholder { color: var(--text-muted); }
  .insert-confirm {
    background: var(--primary); color: white; border: none;
    border-radius: 8px; padding: 6px 12px;
    font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer;
  }
  .insert-cancel {
    background: none; border: none; color: var(--text-muted);
    font-size: 18px; cursor: pointer; padding: 2px 4px;
  }

  .empty {
    text-align: center; padding: 50px 20px; color: var(--text-muted);
  }
  .empty .icon { font-size: 52px; margin-bottom: 14px; }
  .empty p { font-size: 15px; line-height: 1.6; }

  /* ORDER LIST */
  .order-hero {
    background: var(--primary);
    border-radius: 18px; padding: 20px;
    color: white; margin-bottom: 16px;
    box-shadow: 0 4px 20px rgba(27,67,50,0.25);
    position: relative; overflow: hidden;
  }
  .order-hero::before {
    content: ''; position: absolute;
    top: -30px; right: -30px;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
  }
  .order-hero h2 {
    font-family: 'Playfair Display', serif;
    font-size: 20px; font-weight: 700; position: relative; z-index: 1;
  }
  .order-hero span { font-size: 13px; opacity: 0.7; position: relative; z-index: 1; display: block; margin-top: 2px; }

  .order-item {
    background: var(--card); border-radius: 14px; padding: 13px 16px;
    margin-bottom: 8px; display: flex; align-items: center;
    justify-content: space-between; box-shadow: var(--shadow-sm);
    border: 1px solid var(--border);
  }
  .order-item-left { display: flex; align-items: center; gap: 10px; }
  .order-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary-mid); }
  .order-name { font-size: 15px; }
  .order-qty {
    background: var(--primary-light); color: var(--primary);
    border-radius: 8px; padding: 4px 10px; font-size: 13px; font-weight: 700;
  }

  .share-btn {
    width: 100%; padding: 15px; background: var(--primary); color: white;
    border: none; border-radius: 14px; font-family: 'Outfit', sans-serif;
    font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 10px;
    transition: opacity 0.2s; letter-spacing: 0.3px;
  }
  .share-btn:active { opacity: 0.85; }
  .clear-btn {
    width: 100%; padding: 14px; background: var(--red-light); color: var(--red);
    border: none; border-radius: 14px; font-family: 'Outfit', sans-serif;
    font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 8px;
    transition: opacity 0.2s;
  }
  .clear-btn:active { opacity: 0.8; }

  .toast {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1a1a1a; color: white; padding: 12px 20px;
    border-radius: 12px; font-size: 14px; transition: transform 0.3s;
    z-index: 999; white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="header-title">
      <div class="header-icon">🛒</div>
      <h1>Grocery<br>Manager</h1>
      <p>உங்கள் வார order plan</p>
    </div>
    <div class="header-badge" id="header-badge">0 items</div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('all')">எல்லாமே <span class="tab-count" id="all-count">0</span></button>
    <button class="tab" onclick="switchTab('order')">இந்த வாரம் <span class="tab-count" id="order-count">0</span></button>
  </div>
</header>

<div class="section active" id="tab-all">
  <div class="add-box">
    <div class="add-box-label">புதிய item சேர்க்கவும்</div>
    <div class="add-row">
      <input type="text" id="new-item" placeholder="Item பெயர் type செய்யுங்க..." onkeydown="if(event.key==='Enter')addItem()">
      <button class="btn-add" onclick="addItem()">+ சேர்</button>
    </div>
  </div>
  <div id="items-list"></div>
</div>

<div class="section" id="tab-order">
  <div id="order-list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  let items = JSON.parse(localStorage.getItem('grocery_items') || '[]');
  let activeInsert = null;

  function save() { localStorage.setItem('grocery_items', JSON.stringify(items)); }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  function addItem() {
    const input = document.getElementById('new-item');
    const name = input.value.trim();
    if (!name) return;
    if (items.find(i => i.name.toLowerCase() === name.toLowerCase())) {
      showToast('⚠️ இந்த item ஏற்கனவே இருக்கு!'); return;
    }
    items.push({ id: Date.now(), name, selected: false, qty: 1 });
    save(); input.value = ''; render();
    showToast('✅ ' + name + ' சேர்க்கப்பட்டது!');
  }

  function insertAfter(afterId) {
    activeInsert = afterId;
    render();
    setTimeout(() => {
      const inp = document.getElementById('insert-input-' + afterId);
      if (inp) inp.focus();
    }, 50);
  }

  function confirmInsert(afterId) {
    const inp = document.getElementById('insert-input-' + afterId);
    if (!inp) return;
    const name = inp.value.trim();
    if (!name) { cancelInsert(); return; }
    if (items.find(i => i.name.toLowerCase() === name.toLowerCase())) {
      showToast('⚠️ இந்த item ஏற்கனவே இருக்கு!'); return;
    }
    const idx = items.findIndex(i => i.id === afterId);
    items.splice(idx + 1, 0, { id: Date.now(), name, selected: false, qty: 1 });
    activeInsert = null; save(); render();
    showToast('✅ ' + name + ' இடையில் சேர்க்கப்பட்டது!');
  }

  function cancelInsert() { activeInsert = null; render(); }

  function toggleItem(id) {
    const item = items.find(i => i.id === id);
    if (item) { item.selected = !item.selected; save(); render(); }
  }

  function deleteItem(id) {
    items = items.filter(i => i.id !== id);
    save(); render(); showToast('🗑️ Item நீக்கப்பட்டது');
  }

  function changeQty(id, delta) {
    const item = items.find(i => i.id === id);
    if (item) { item.qty = Math.max(1, (item.qty || 1) + delta); save(); render(); }
  }

  function clearSelections() {
    if (!confirm('இந்த வாரம் selections clear ஆகும். சரியா?')) return;
    items.forEach(i => { i.selected = false; i.qty = 1; });
    save(); render(); showToast('✅ வார list clear ஆச்சு!');
  }

  function shareList() {
    const selected = items.filter(i => i.selected);
    if (!selected.length) { showToast('⚠️ எந்த item-உம் select ஆகல!'); return; }
    const text = '🛒 இந்த வாரம் Grocery List:\n\n' + selected.map(i => i.name + '-' + i.qty).join('\n');
    if (navigator.share) {
      navigator.share({ title: 'Grocery List', text });
    } else {
      navigator.clipboard.writeText(text).then(() => showToast('📋 List copy ஆச்சு!'));
    }
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='all')||(i===1&&tab==='order')));
    document.getElementById('tab-all').classList.toggle('active', tab === 'all');
    document.getElementById('tab-order').classList.toggle('active', tab === 'order');
  }

  function itemHTML(item) {
    return `
    <div>
      <div class="item-card ${item.selected ? 'selected' : ''}" onclick="toggleItem(${item.id})">
        <div class="checkbox">${item.selected ? '✓' : ''}</div>
        <span class="item-name">${item.name}</span>
        ${item.selected ? `
        <div class="item-qty" onclick="event.stopPropagation()">
          <div class="qty-btn" onclick="changeQty(${item.id},-1)">−</div>
          <span class="qty-num">${item.qty}</span>
          <div class="qty-btn" onclick="changeQty(${item.id},1)">+</div>
        </div>` : ''}
        <div class="item-actions" onclick="event.stopPropagation()">
          <button class="delete-btn" onclick="deleteItem(${item.id})">✕</button>
        </div>
      </div>
      ${activeInsert === item.id ? `
      <div class="inline-insert show">
        <input id="insert-input-${item.id}" placeholder="இங்கே item type செய்யுங்க..." onkeydown="if(event.key==='Enter')confirmInsert(${item.id});if(event.key==='Escape')cancelInsert()">
        <button class="insert-confirm" onclick="confirmInsert(${item.id})">சேர்</button>
        <button class="insert-cancel" onclick="cancelInsert()">✕</button>
      </div>` : `
      <div class="insert-zone">
        <div class="insert-line"></div>
        <button class="insert-btn" onclick="insertAfter(${item.id})">+ இங்கே சேர்</button>
        <div class="insert-line"></div>
      </div>`}
    </div>`;
  }

  function render() {
    const selected = items.filter(i => i.selected);
    const unselected = items.filter(i => !i.selected);
    const total = items.length;

    document.getElementById('all-count').textContent = total;
    document.getElementById('order-count').textContent = selected.length;
    document.getElementById('header-badge').textContent = total + ' items';

    const list = document.getElementById('items-list');
    if (!items.length) {
      list.innerHTML = `<div class="empty"><div class="icon">🛍️</div><p>Items இல்ல!<br>மேலே type செய்து சேர்க்கவும்</p></div>`;
    } else {
      let html = '';
      if (selected.length) {
        html += `<div class="list-label">✅ இந்த வாரம் (${selected.length})</div>`;
        html += selected.map(itemHTML).join('');
      }
      if (unselected.length) {
        html += `<div class="list-label">📦 எல்லா items (${unselected.length})</div>`;
        html += unselected.map(itemHTML).join('');
      }
      list.innerHTML = html;
    }

    const orderList = document.getElementById('order-list');
    if (!selected.length) {
      orderList.innerHTML = `<div class="empty"><div class="icon">🗂️</div><p>எந்த item-உம் select ஆகல!<br>"எல்லாமே" tab-ல் போய் tick செய்யுங்க</p></div>`;
    } else {
      let html = `<div class="order-hero">
        <h2>இந்த வாரம் Order</h2>
        <span>${selected.length} items ready ✓</span>
      </div>`;
      html += selected.map(item => `
        <div class="order-item">
          <div class="order-item-left">
            <div class="order-dot"></div>
            <span class="order-name">${item.name}</span>
          </div>
          <span class="order-qty">- ${item.qty}</span>
        </div>`).join('');
      html += `<button class="share-btn" onclick="shareList()">📤 WhatsApp-ல் Share செய்</button>`;
      html += `<button class="clear-btn" onclick="clearSelections()">🔄 வாரம் முடிஞ்சது — Clear செய்</button>`;
      orderList.innerHTML = html;
    }
  }

  render();
</script>
</body>
</html>
